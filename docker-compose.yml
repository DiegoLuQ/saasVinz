# =============================================================================
#  SaaSCrematorio V2 — Despliegue en VPS
#  - Reverse proxy: jwilder/nginx-proxy + letsencrypt-companion (YA existen en
#    el VPS). Se integra por variables VIRTUAL_HOST / LETSENCRYPT_HOST.
#  - PostgreSQL: servicio PROPIO del compose (contenedor vinzer_postgres, con
#    volumen persistente). El backend se auto-provisiona contra él (rol de la
#    app + migraciones) al arrancar — ver entrypoint.sh / provision_db.sh.
#  - Red: web_private_red_webapps (externa, la del reverse-proxy) para lo que
#    debe ser alcanzable desde fuera; db_internal (interna, la crea el compose)
#    para el tráfico backend/pgadmin ↔ postgres, que NO se expone al exterior.
#  Todos los valores provienen del .env de la raíz.
# =============================================================================

services:
  # --- POSTGRESQL (BD propia del stack) ---
  postgres:
    image: postgres:16-alpine
    container_name: vinzer_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # Subcarpeta propia dentro del volumen: evita el problema de "lost+found"
      # que algunos drivers de volumen crean en la raíz del punto de montaje.
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - db_internal

  # --- BACKEND (FastAPI) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vinzer_backend
    restart: unless-stopped
    expose:
      - "8000"
    # Fuente ÚNICA de config: el .env de la raíz (secretos del backend incluidos).
    # backend/.env solo se usa para desarrollo local sin Docker.
    env_file:
      - .env
    environment:
      # Conexión a la BD propia (contenedor 'postgres') con el usuario de la
      # app (RLS APLICA).
      - SQLALCHEMY_DATABASE_URL=postgresql://${APP_USER}:${APP_USER_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}
      # Credenciales admin para los respaldos (superusuario, ignora RLS).
      - DB_ADMIN_USER=${POSTGRES_USER}
      - DB_ADMIN_PASS=${POSTGRES_PASSWORD}
      # URLs públicas (sobrescriben los valores de desarrollo de backend/.env).
      - BASE_URL=https://${DOMAIN_APP}
      - FRONTEND_URL=https://${DOMAIN_MAIN}
      # pg_dump corre dentro del backend (postgresql-client) vía TCP; no se usa
      # la rama docker-exec, por eso se deja vacío.
      - BACKUP_PG_CONTAINER=
      # Rate limiting persistente (sobrevive reinicios y réplicas adicionales).
      - REDIS_URL=redis://redis:6379/0
      # Integración con nginx-proxy + Let's Encrypt:
      - VIRTUAL_HOST=${DOMAIN_API}
      - VIRTUAL_PORT=8000
      - LETSENCRYPT_HOST=${DOMAIN_API}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - web
      - db_internal

  # --- REDIS (rate limiting compartido; futuro: caché/colas) ---
  redis:
    image: redis:7-alpine
    container_name: vinzer_redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    networks:
      - web

  # --- FRONTEND (Next.js) ---
  frontend:
    build:
      context: ./frontend-saas
      dockerfile: Dockerfile
      args:
        # Variables públicas (NEXT_PUBLIC_*): se hornean en build desde el .env raíz.
        # Las 3 primeras se derivan de los DOMAIN_*; el resto son explícitas.
        NEXT_PUBLIC_API_URL: https://${DOMAIN_API}
        NEXT_PUBLIC_ROOT_DOMAIN: ${DOMAIN_MAIN}
        NEXT_PUBLIC_MEMORIAL_DOMAIN: ${DOMAIN_MEMORIALS}
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY}
        NEXT_PUBLIC_CLOUDFLARE_R2: ${NEXT_PUBLIC_CLOUDFLARE_R2}
        NEXT_PUBLIC_TRACKING_BASE_URL: ${NEXT_PUBLIC_TRACKING_BASE_URL}
        NEXT_PUBLIC_MEMORIAL_BASE_URL: ${NEXT_PUBLIC_MEMORIAL_BASE_URL}
        NEXT_PUBLIC_WIDGET_BASE_URL: ${NEXT_PUBLIC_WIDGET_BASE_URL}
        NEXT_PUBLIC_VINZER_URL: ${NEXT_PUBLIC_VINZER_URL}
        NEXT_PUBLIC_VINZER_SLOGAN: ${NEXT_PUBLIC_VINZER_SLOGAN}
    container_name: vinzer_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      # El front sirve el landing (raíz) y los subdominios app/admin/memorial/track.
      - VIRTUAL_HOST=${DOMAIN_MAIN},www.${DOMAIN_MAIN},${DOMAIN_APP},${DOMAIN_ADMIN},${DOMAIN_MEMORIALS},${DOMAIN_TRACK}
      - VIRTUAL_PORT=3000
      - LETSENCRYPT_HOST=${DOMAIN_MAIN},www.${DOMAIN_MAIN},${DOMAIN_APP},${DOMAIN_ADMIN},${DOMAIN_MEMORIALS},${DOMAIN_TRACK}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    networks:
      - web

  # --- PGADMIN (UI de la BD) ---
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vinzer_pgadmin
    restart: unless-stopped
    expose:
      - "80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
      - PGADMIN_CONFIG_SERVER_MODE=False
      # Necesario detrás de un reverse proxy con TLS para evitar redirecciones a http:
      - PGADMIN_CONFIG_PROXY_X_FOR_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PROTO_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_HOST_COUNT=1
      - PGADMIN_CONFIG_PROXY_X_PORT_COUNT=1
      # Integración con nginx-proxy + Let's Encrypt:
      - VIRTUAL_HOST=${DOMAIN_PGADMIN}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${DOMAIN_PGADMIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - web
      - db_internal

volumes:
  postgres_data:
  pgadmin_data:

networks:
  # La red la administra el reverse-proxy existente; aquí se referencia como externa.
  web:
    external: true
    name: ${EXTERNAL_NETWORK}
  # Red privada creada por este compose: solo backend/pgadmin/postgres la
  # comparten. No es alcanzable desde el reverse-proxy ni desde fuera del host.
  db_internal:
    driver: bridge
